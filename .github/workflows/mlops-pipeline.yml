name: CI/CD Pipeline Telecom Churn

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Étape 1 : Intégration Continue (CI) - Tests de l'application
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # À adapter selon ta version

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx # httpx est souvent requis pour tester FastAPI/Flask

      - name: Exécution des tests unitaires
        run: |
          pytest tests/test_api.py -v

  # Étape 2 : Déploiement Continu (CD) - Construction Docker
  build-and-deploy:
    needs: test # Ne s'exécute que si les tests passent
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Construction de l'image Docker
        run: |
          docker build -t alec34pi/telecom-churn-api:latest .
          
      - name: Simulation de déploiement
        run: |
          echo "L'image Docker a été construite avec succès !"
          echo "Ici, on ajouterait les commandes pour pousser sur DockerHub ou déployer sur un serveur."